<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datum OS</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --text: #f8fafc; }
        body { 
            margin: 0; background-color: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #030712 70%);
            display: flex; justify-content: center; align-items: center;
        }
        .container { text-align: center; max-width: 420px; padding: 20px; }
        h1 { font-weight: 600; font-size: 3rem; letter-spacing: -0.05em; margin: 0; }
        p { color: #94a3b8; margin: 12px 0 40px; font-weight: 300; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Datum OS</h1>
        <p>A structured framework for the aggregation, reconciliation, and long-term oversight of personal capital.</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="outline" 
             data-text="signin_with" 
             data-size="large">
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // 1. Store session so dashboard knows you're authorized
            localStorage.setItem('datum_session', 'active');
            
            // 2. Redirect to dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
