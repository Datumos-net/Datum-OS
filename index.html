<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datum OS</title>
    
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="theme-color" content="#030712">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #030712; --text: #f8fafc; --silver: #f8fafc; --accent: #94a3b8; }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .boot-content { text-align: center; width: 85%; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .boot-content h1 { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1.8rem; color: var(--silver); margin: 0; }
        .boot-content p { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 0.65rem; margin-top: 15px; letter-spacing: 0.2em; }
        
        .progress-track { width: 140px; height: 1px; background: #1e293b; margin: 25px auto 0; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: var(--silver); box-shadow: 0 0 10px var(--silver); animation: boot 1.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .progress-bar::after { content: ""; position: absolute; top: 0; right: 0; height: 100%; width: 30px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); animation: shimmer 1.8s infinite; }
        
        @keyframes boot { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .hidden { display: none !important; }

        /* Main Content */
        /* REVERTED: Removed touch-action so browsers work normally */
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; max-width: 420px; padding: 20px; }
        h1 { font-weight: 600; font-size: 3rem; letter-spacing: -0.05em; margin: 0; }
        p { color: #94a3b8; margin: 12px 0 40px; font-weight: 300; line-height: 1.6; }
        
        /* Native Button Styling */
        .auth-btn { 
            background: #ffffff; 
            color: #030712; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 9999px; 
            font-weight: 600; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 12px; 
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s, opacity 0.3s; 
            width: 100%; 
            justify-content: center; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }
        .auth-btn:focus { outline: none; }
        .auth-btn:hover { background: #e2e8f0; transform: translateY(-1px); }
        .auth-btn:active { transform: scale(0.96); }
        
        /* Elegant Error Message Styling */
        .error-text {
            color: #f87171; 
            font-size: 0.85rem;
            margin-top: 16px;
            font-weight: 400;
            animation: fadeIn 0.3s ease-out;
        }

        /* Native-feeling Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #030712;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="boot-content">
            <h1>Datum OS</h1>
            <p>INITIALIZING</p>
            <div class="progress-track"><div class="progress-bar"></div></div>
        </div>
    </div>

    <div class="container">
        <h1>Datum OS</h1>
        <p>A structured framework for the aggregation, reconciliation, and long-term oversight of personal capital.</p>
        
        <button id="google-btn" class="auth-btn" onclick="signIn()">
            <div class="spinner hidden" id="btn-spinner"></div>
            <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            <span id="btn-text">Sign in with Google</span>
        </button>

        <div id="error-message" class="error-text hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "API KEY",
            authDomain: "datum-os.firebaseapp.com",
            projectId: "datum-os",
            storageBucket: "datum-os.firebasestorage.app",
            messagingSenderId: "MESSAGE SENDER ID",
            appId: "APP ID"
        };

        let app = initializeApp(firebaseConfig);
        let auth = getAuth(app);
        
        let authTimeoutId = null; 
        let attemptStartTime = 0; 
        let isConnecting = false; 

        // 1. THE ULTIMATE SOURCE OF TRUTH
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('datum_session', 'active');
                window.location.href = 'dashboard.html';
            }
        });

        // 2. CATCH RETURNS FROM REDIRECT
        getRedirectResult(auth).then((result) => {
            if (!result || !result.user) resetButtonState(); 
        }).catch((error) => {
            resetButtonState(); 
            if (error.code === 'auth/popup-closed-by-user' || error.code === 'auth/cancelled-popup-request') return; 
            showError("Authentication failed or was cancelled. Please try again.");
            rebootEngine();
        });

        // 3. DYNAMIC NETWORK LISTENERS
        window.addEventListener('offline', () => {
            if (isConnecting) {
                if (authTimeoutId) clearTimeout(authTimeoutId);
                resetButtonState();
                rebootEngine();
            }
            showError("Connection lost. Operating in offline mode.");
            document.getElementById('google-btn').style.opacity = "0.6"; 
        });

        window.addEventListener('online', () => {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('google-btn').style.opacity = "1"; 
        });

        // 4. BULLETPROOF SIGN IN FUNCTION 
        window.signIn = function() {
            const errorDiv = document.getElementById('error-message');

            // STATE MACHINE LOGIC
            if (isConnecting) {
                if (Date.now() - attemptStartTime < 3000) return; 
                
                if (authTimeoutId) clearTimeout(authTimeoutId);
                resetButtonState();
                showError("Connection aborted. Please try again.");
                rebootEngine();
                return;
            }

            // OFFLINE CHECK
            if (!navigator.onLine) {
                showError("No network detected. Please connect to the internet.");
                return; 
            }

            // INITIATE FRESH ATTEMPT
            isConnecting = true;
            attemptStartTime = Date.now();
            errorDiv.classList.add('hidden');
            document.getElementById('btn-icon').classList.add('hidden');
            document.getElementById('btn-spinner').classList.remove('hidden');
            document.getElementById('btn-text').textContent = "Connecting...";

            // THE 8-SECOND DEADMAN'S SWITCH
            if (authTimeoutId) clearTimeout(authTimeoutId);
            authTimeoutId = setTimeout(() => {
                if (isConnecting) {
                    resetButtonState();
                    showError("Connection timed out. Google's secure server didn't respond.");
                    rebootEngine(); 
                }
            }, 8000); 

            // FIRE THE MODULAR ENGINE
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' }); 
                signInWithRedirect(auth, provider).catch((error) => {
                    if (authTimeoutId) clearTimeout(authTimeoutId);
                    resetButtonState();
                    showError("Unable to reach Google servers. Please try again.");
                    rebootEngine(); 
                });
            } catch (fatalError) {
                if (authTimeoutId) clearTimeout(authTimeoutId);
                resetButtonState();
                showError("Unable to reach Google servers. Please try again.");
                rebootEngine(); 
            }
        };

        // --- Core Helper Functions ---
        function resetButtonState() {
            isConnecting = false;
            const btnIcon = document.getElementById('btn-icon');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnText = document.getElementById('btn-text');
            
            if (btnIcon && btnSpinner) {
                btnSpinner.classList.add('hidden');
                btnIcon.classList.remove('hidden');
                btnText.textContent = "Sign in with Google";
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        // --- The Hot-Swap Function ---
        function rebootEngine() {
            try {
                app = initializeApp(firebaseConfig, 'Recovery_' + Date.now());
                auth = getAuth(app);
            } catch(e) {}
        }

        // Handle Back-Forward Cache restores
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                resetButtonState();
                rebootEngine();
            }
        });
    </script>

    <script>
        // NEW: PWA-Only Zoom Lock
        // Dynamically locks the UI only if the user has installed it as an app
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            document.querySelector('meta[name="viewport"]').setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
            document.body.style.touchAction = 'manipulation';
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 500);
            }, 1800);
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(err => {
                console.log("Service Worker registration failed:", err);
            });
        }
    </script>
</body>
</html>
