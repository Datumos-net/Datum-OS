<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Datum OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #f4f4f5; --bg-surface: #ffffff; --bg-sidebar: #0f172a;
            --text-main: #18181b; --text-muted: #71717a; --border-light: #e4e4e7;
            --accent: #2563eb;
        }
        [data-theme="dark"] {
            --bg-app: #0f172a; --bg-surface: #1e293b; --text-main: #f1f5f9;
            --border-light: #334155; --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); display: flex; min-height: 100vh; transition: background 0.3s; }
        
        .sidebar { width: 240px; background: #0f172a; color: #cbd5e1; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .brand { padding: 20px; font-size: 1.1rem; font-weight: 700; color: #ffffff; border-bottom: 1px solid #1e293b; }
        .nav-btn { background: transparent; border: none; color: #94a3b8; padding: 12px 20px; text-align: left; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .nav-btn.active { color: #ffffff; background: #1e293b; border-left: 3px solid var(--accent); }
        
        .main-content { flex: 1; margin-left: 240px; display: flex; flex-direction: column; }
        .time-engine { background: var(--bg-surface); padding: 16px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 24px; }
        .dash-card { background: var(--bg-surface); border-radius: 12px; padding: 24px; border: 1px solid var(--border-light); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">Datum OS</div>
        <nav style="display:flex; flex-direction:column; padding:16px 0;">
            <button class="nav-btn active" onclick="app.switchTab('view-overview', this)">Overview</button>
            <button class="nav-btn" onclick="app.switchTab('view-assets', this)">Assets</button>
            <button class="nav-btn" onclick="app.switchTab('view-liab', this)">Obligations</button>
        </nav>
    </aside>
    <main class="main-content">
        <header class="time-engine">
            <h1>Operational</h1>
        </header>
        <div class="dashboard-grid">
            <div id="view-overview" class="dash-card"><h2>Overview</h2><p>System status: Nominal.</p></div>
            <div id="view-assets" class="dash-card"><h2>Assets</h2><p>Capital foundation view.</p></div>
            <div id="view-liab" class="dash-card"><h2>Obligations</h2><p>Liability management.</p></div>
        </div>
    </main>
    <script>
        const app = {
            switchTab: function(id, btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        };
    </script>
</body>
</html>
